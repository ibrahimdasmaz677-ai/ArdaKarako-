<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arda Karakoç</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .booking-container {
            background-color: #1e1e1e;
            padding: 50px 40px;
            border-radius: 8px;
            border-top: 4px solid #d4af37;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .booking-container h2 {
            color: #d4af37;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 26px;
        }
        .booking-container .brand-sub {
            color: #d4af37;
            font-size: 12px;
            letter-spacing: 4px;
            margin-bottom: 25px;
            display: block;
            opacity: 0.8;
        }
        .booking-container p {
            color: #a0a0a0;
            margin-bottom: 40px;
            font-size: 15px;
            line-height: 1.6;
        }
        .submit-btn {
            display: inline-block;
            width: 100%;
            padding: 18px;
            background-color: #d4af37;
            color: #121212;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }
        .submit-btn:hover {
            background-color: #ffffff;
            color: #121212;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="booking-container">
    <h2>ARDA KARAKOÇ</h2>
    <span class="brand-sub">HAIR DESIGNER</span>
    
    <p>Premium kesim deneyimi için takvimden size uygun olan boş saati seçin. Seçtiğiniz saat adınıza rezerve edilecektir.</p>
    
    <a href="https://calendly.com/ibrahimdasmaz677/30min?locale=tr" class="submit-btn" target="_blank">
        Randevu Takvimini Aç
    </a>
</div>

</body>
</html>
